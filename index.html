<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サブスク管理表</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== ヘッダー (ログイン後に表示) ========== -->
  <header id="appHeader" class="app-header" style="display:none">
    <h1>サブスク管理表</h1>
    <div class="header-right">
      <!-- ログイン中のメールアドレスを表示 -->
      <span id="userEmail" class="user-email"></span>
      <button id="logoutBtn" class="logout-btn">ログアウト</button>
    </div>
  </header>

  <!-- ========== ログイン / 新規登録セクション ========== -->
  <!-- ログインしていないときだけ表示される -->
  <section id="loginSection" class="login-section">
    <h2 class="login-title">サブスク管理表</h2>
    <p class="login-subtitle" id="loginSubtitle">ログインしてください</p>

    <form id="authForm" class="login-form">
      <div class="form-row">
        <label for="emailInput">メールアドレス</label>
        <input type="email" id="emailInput" placeholder="example@email.com" required />
      </div>
      <div class="form-row">
        <label for="passwordInput">パスワード</label>
        <input type="password" id="passwordInput" placeholder="6文字以上" required />
      </div>

      <!-- エラーメッセージ表示エリア -->
      <p id="authError" class="auth-error"></p>

      <button type="submit" id="authSubmitBtn">ログイン</button>
    </form>

  </section>

  <!-- ========== メインコンテンツ (ログイン後に表示) ========== -->
  <main id="mainContent" style="display:none">

    <!-- サービス追加フォーム -->
    <section class="form-section">
      <h2>サービスを追加</h2>
      <form id="subscForm">

        <div class="form-row">
          <label for="serviceName">サービス名</label>
          <input type="text" id="serviceName" placeholder="例: Netflix" />
        </div>

        <div class="form-row">
          <label for="category">カテゴリ</label>
          <select id="category">
            <option value="private">プライベート</option>
            <option value="work">仕事</option>
            <option value="tax">税金</option>
          </select>
        </div>

        <div class="form-row">
          <label for="currency">通貨</label>
          <select id="currency">
            <option value="JPY">円 (JPY)</option>
            <option value="USD">ドル (USD)</option>
          </select>
        </div>

        <div class="form-row">
          <label for="monthlyFee">月額</label>
          <input type="number" id="monthlyFee" placeholder="例: 990" min="0" />
        </div>

        <div class="form-row">
          <label for="yearlyFee">年額</label>
          <input type="number" id="yearlyFee" placeholder="例: 9900" min="0" />
        </div>

        <div class="form-row">
          <label for="renewalDate">更新日</label>
          <input type="date" id="renewalDate" />
        </div>

        <div class="form-row">
          <label for="status">ステータス</label>
          <select id="status">
            <option value="active">利用中</option>
            <option value="considering">解約検討中</option>
            <option value="cancelled">解約済み</option>
          </select>
        </div>

        <button type="submit">追加する</button>
      </form>
    </section>

    <!-- 合計表示エリア -->
    <section class="summary-section">
      <h2>合計</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <h3>全体</h3>
          <p>月額合計: <span id="totalMonthly">-</span></p>
          <p>年額合計: <span id="totalYearly">-</span></p>
        </div>
        <div class="summary-card">
          <h3>仕事</h3>
          <p>月額合計: <span id="workMonthly">-</span></p>
          <p>年額合計: <span id="workYearly">-</span></p>
        </div>
        <div class="summary-card">
          <h3>プライベート</h3>
          <p>月額合計: <span id="privateMonthly">-</span></p>
          <p>年額合計: <span id="privateYearly">-</span></p>
        </div>
        <div class="summary-card">
          <h3>税金</h3>
          <p>月額合計: <span id="taxMonthly">-</span></p>
          <p>年額合計: <span id="taxYearly">-</span></p>
        </div>
      </div>
      <p class="note">※ 円とドルは別々に集計しています（解約済みは除く）</p>
    </section>

    <!-- 一覧表示エリア -->
    <section class="list-section">
      <h2>一覧</h2>

      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="work">仕事</button>
        <button class="filter-btn" data-filter="private">プライベート</button>
        <button class="filter-btn" data-filter="tax">税金</button>
      </div>

      <table id="subscTable">
        <thead>
          <tr>
            <th>カテゴリ</th>
            <th>サービス名</th>
            <th>月額</th>
            <th>年額</th>
            <th>更新日</th>
            <th>ステータス</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="subscList"></tbody>
      </table>

      <p id="emptyMessage" class="empty-msg">まだサービスが登録されていません。</p>
    </section>

  </main>

  <!-- Supabase クライアントライブラリ (CDN から読み込む) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- アプリのスクリプト -->
  <script src="script.js"></script>
</body>
</html>
